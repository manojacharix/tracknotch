name: TrackNotch
options:
  bundleIdPrefix: com.tracknotch
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
      DEVELOPMENT_TEAM: ""
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "-"
      DEVELOPMENT_TEAM: ""

packages:
  PhosphorSwift:
    url: https://github.com/phosphor-icons/swift
    from: "2.1.0"

targets:
  TrackNotch:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    dependencies:
      - package: PhosphorSwift
        product: PhosphorSwift
    sources:
      - path: TrackNotch
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tracknotch.app
        PRODUCT_NAME: TrackNotch
        INFOPLIST_FILE: TrackNotch/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: TrackNotch/Resources/TrackNotch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_TESTABILITY: YES
    info:
      path: TrackNotch/Resources/Info.plist
      properties:
        CFBundleName: TrackNotch
        CFBundleDisplayName: TrackNotch
        CFBundleIdentifier: com.tracknotch.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
  TrackNotchTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: TrackNotchTests
        excludes:
          - "**/*.md"
    dependencies:
      - target: TrackNotch
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TrackNotch.app/Contents/MacOS/TrackNotch"
        PRODUCT_BUNDLE_IDENTIFIER: com.tracknotch.app.tests
        GENERATE_INFOPLIST_FILE: YES

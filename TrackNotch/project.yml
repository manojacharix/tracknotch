name: TrackNotch
options:
  bundleIdPrefix: com.tracknotch
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

packages:
  PhosphorSwift:
    url: https://github.com/phosphor-icons/swift
    from: "2.1.0"

targets:
  TrackNotch:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    dependencies:
      - package: PhosphorSwift
        product: PhosphorSwift
    sources:
      - path: TrackNotch
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tracknotch.app
        PRODUCT_NAME: TrackNotch
        INFOPLIST_FILE: TrackNotch/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: TrackNotch/Resources/TrackNotch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: TrackNotch/Resources/Info.plist
      properties:
        CFBundleName: TrackNotch
        CFBundleDisplayName: TrackNotch
        CFBundleIdentifier: com.tracknotch.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
